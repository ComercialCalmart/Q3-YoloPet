<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow,noarchive">
<meta name="referrer" content="no-referrer">
<title>YOLOPET · Acesso restrito</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700;9..40,900&family=DM+Mono:wght@400;500&family=Jost:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',system-ui,sans-serif;background:#000;color:#fff;min-height:100vh;display:grid;place-items:center;padding:24px;-webkit-font-smoothing:antialiased}
body.aberto{display:block;padding:0;background:#F4F3F0;color:#000}
#gate{width:100%;max-width:380px;position:relative}
.lockup{display:flex;align-items:center;gap:15px;margin-bottom:30px}
.mark{width:52px;height:52px;flex-shrink:0;display:block}
.wordmark{font-family:'Jost','DM Sans',sans-serif;font-size:20px;font-weight:500;letter-spacing:7px}
h1{font-size:22px;font-weight:900;letter-spacing:-.5px;margin-bottom:6px}
p.sub{font-size:12px;color:rgba(255,255,255,.4);line-height:1.6;margin-bottom:24px}
label{display:block;font-size:9px;font-weight:900;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:7px}
.field{display:flex;gap:7px}
input{flex:1;min-width:0;font-family:inherit;font-size:15px;font-weight:700;letter-spacing:1px;padding:13px 14px;border-radius:4px;border:1.5px solid rgba(255,255,255,.18);background:#0C0C0C;color:#fff}
input:focus{outline:none;border-color:#63BDDB}
button{font-family:inherit;cursor:pointer;border:none;background:#63BDDB;color:#000;font-size:11px;font-weight:900;letter-spacing:2px;text-transform:uppercase;padding:13px 20px;border-radius:4px}
button:disabled{opacity:.5;cursor:progress}
.msg{font-size:12px;line-height:1.5;margin-top:14px;min-height:18px;color:#FF7A7A}
.msg.ok{color:#63BDDB}
.foot{margin-top:28px;padding-top:16px;border-top:1px solid rgba(255,255,255,.1);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.25)}
.shake{animation:shake .32s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}
@media(prefers-reduced-motion:reduce){*{animation:none!important}}
</style>
</head>
<body>
<div id="gate">
  <div class="lockup">
    <svg class="mark" viewBox="0 0 64 64" role="img" aria-label="YOLOPET">
      <rect width="64" height="64" rx="15" fill="#FEFEFE"/>
      <g fill="none" stroke="#000" stroke-width="11.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20.5 20.5 L32 33.5 L43.5 20.5"/>
        <path d="M32 33.5 L32 45.8"/>
      </g>
      <circle cx="19.4" cy="46.4" r="3.4" fill="#000"/>
    </svg>
    <span class="wordmark">YOLOPET</span>
  </div>
  <h1>Portfólio</h1>
  <p class="sub">Tabela de custo e condições comerciais. Conteúdo restrito a parceiros com senha de acesso.</p>
  <label for="pw">Senha de acesso</label>
  <div class="field">
    <input id="pw" type="password" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" placeholder="••••••••••">
    <button id="go">Entrar</button>
  </div>
  <div class="msg" id="msg"></div>
  <div class="foot">Calmart · Birigui, SP</div>
</div>

  var IT = 310000;
  var erros = 0, travadoAte = 0;

  var msg = document.getElementById('msg');
  var pw  = document.getElementById('pw');
  var go  = document.getElementById('go');

  function b64(s){
    var bin = atob(s), a = new Uint8Array(bin.length);
    for(var i=0;i<bin.length;i++) a[i] = bin.charCodeAt(i);
    return a;
  }

  async function abrir(senha){
    var raw  = b64(B);
    var salt = raw.slice(0,16);
    var iv   = raw.slice(16,28);
    var dados= raw.slice(28);
    var base = await crypto.subtle.importKey('raw', new TextEncoder().encode(senha), 'PBKDF2', false, ['deriveKey']);
    var key  = await crypto.subtle.deriveKey(
      { name:'PBKDF2', salt:salt, iterations:IT, hash:'SHA-256' },
      base, { name:'AES-GCM', length:256 }, false, ['decrypt']
    );
    var claro = await crypto.subtle.decrypt({ name:'AES-GCM', iv:iv }, key, dados);
    return new TextDecoder().decode(claro);
  }

  function montar(html){
    var doc = new DOMParser().parseFromString(html, 'text/html');
    var scripts = Array.prototype.slice.call(doc.querySelectorAll('script'));
    scripts.forEach(function(s){ s.remove(); });
    doc.querySelectorAll('style').forEach(function(s){ document.head.appendChild(s.cloneNode(true)); });
    document.body.className = 'aberto';
    document.body.innerHTML = doc.body.innerHTML;
    document.title = 'YOLOPET · Portfólio e condições comerciais';
    scripts.forEach(function(s){
      var n = document.createElement('script');
      n.textContent = s.textContent;
      document.body.appendChild(n);
    });
  }

  async function tentar(){
    var agora = Date.now();
    if(agora < travadoAte){
      msg.className = 'msg';
      msg.textContent = 'Aguarde ' + Math.ceil((travadoAte-agora)/1000) + 's antes de tentar de novo.';
      return;
    }
    var senha = pw.value;
    if(!senha){ pw.focus(); return; }
    go.disabled = true;
    msg.className = 'msg ok';
    msg.textContent = 'Verificando...';
    try{
      var html = await abrir(senha);
      msg.textContent = 'Acesso liberado.';
      montar(html);
    }catch(e){
      erros++;
      go.disabled = false;
      pw.value = '';
      pw.focus();
      document.getElementById('gate').classList.add('shake');
      setTimeout(function(){ document.getElementById('gate').classList.remove('shake'); }, 340);
      msg.className = 'msg';
      if(erros >= 3){
        travadoAte = Date.now() + 15000 * (erros - 2);
        msg.textContent = 'Senha incorreta. Nova tentativa liberada em ' + (15*(erros-2)) + 's.';
      } else {
        msg.textContent = 'Senha incorreta. Confira maiúsculas e o caractere especial.';
      }
    }
  }

  go.addEventListener('click', tentar);
  pw.addEventListener('keydown', function(e){ if(e.key === 'Enter') tentar(); });
  pw.focus();
})();
